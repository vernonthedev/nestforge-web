name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release:')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Get last release tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Analyze commits since last release
        id: analyze
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          COMMITS=$(git log --format="%s%n%b" $LAST_TAG..HEAD 2>/dev/null || echo "")
          
          MAJOR=false
          MINOR=false
          PATCH=false
          
          while IFS= read -r line; do
            if [[ "$line" == *"BREAKING"* ]] || [[ "$line" =~ \!: ]]; then
              MAJOR=true
            fi
            if [[ "$line" =~ ^feat ]] || [[ "$line" =~ ^refactor ]] || [[ "$line" =~ ^perf ]]; then
              MINOR=true
            elif [[ "$line" =~ ^fix ]] || [[ "$line" =~ ^docs ]] || [[ "$line" =~ ^test ]] || [[ "$line" =~ ^build ]] || [[ "$line" =~ ^ci ]]; then
              PATCH=true
            fi
          done <<< "$COMMITS"
          
          echo "has_minor=$MINOR" >> $GITHUB_OUTPUT
          echo "has_patch=$PATCH" >> $GITHUB_OUTPUT
          
          CURRENT="${LAST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"
          
          if [[ "$MAJOR" == "true" ]]; then
            minor=0
            patch=0
            major=$((major + 1))
          elif [[ "$MINOR" == "true" ]]; then
            patch=0
            minor=$((minor + 1))
          else
            patch=$((patch + 1))
          fi
          
          NEW_VERSION="$major.$minor.$patch"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update workspace version
        run: |
          VERSION="${{ steps.analyze.outputs.new_version }}"
          # Update root Cargo.toml
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          # Update all workspace crates (replace version.workspace = true with version = "X.Y.Z")
          sed -i 's/^version\.workspace = true$/version = "'"$VERSION"'"/' crates/nestforge-web-core/Cargo.toml
          sed -i 's/^version\.workspace = true$/version = "'"$VERSION"'"/' crates/nestforge-web/Cargo.toml
          sed -i 's/^version\.workspace = true$/version = "'"$VERSION"'"/' crates/nestforge-web-cli/Cargo.toml

      - name: Replace path deps with version deps for publishing
        run: |
          VERSION="${{ steps.analyze.outputs.new_version }}"
          
          # For nestforge-web: replace path with version (remove the closing })
          sed -i 's|nestforge-web-core = { path = "../nestforge-web-core" }|nestforge-web-core = "'"$VERSION"'"|' crates/nestforge-web/Cargo.toml
          sed -i 's|nestforge-web-core = { path = "../nestforge-web-core" }|nestforge-web-core = "'"$VERSION"'"|' crates/nestforge-web-cli/Cargo.toml

      - name: Show updated files
        run: |
          echo "=== nestforge-web/Cargo.toml ==="
          grep -A2 "nestforge-web-core" crates/nestforge-web/Cargo.toml || echo "Not found"
          echo ""
          echo "=== nestforge-web-cli/Cargo.toml ==="
          grep -A2 "nestforge-web-core" crates/nestforge-web-cli/Cargo.toml || echo "Not found"

      - name: Run tests
        run: cargo test --workspace

      - name: Publish nestforge-web-core
        run: |
          cargo publish -p nestforge-web-core

      - name: Wait before next publish
        run: sleep 15

      - name: Publish nestforge-web
        run: |
          cargo publish -p nestforge-web

      - name: Wait before next publish
        run: sleep 15

      - name: Publish nestforge-web-cli
        run: |
          cargo publish -p nestforge-web-cli

      - name: Create commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): ${{ steps.analyze.outputs.new_version }}"
          git tag "v${{ steps.analyze.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.analyze.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag: v${{ steps.analyze.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
