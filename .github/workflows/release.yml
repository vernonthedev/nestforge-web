name: Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

permissions:
  contents: read

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Cargo config
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [ registries ]
          crates-io = { index = "sparse+https://index.crates.io/" }
          EOF

      - name: Validate workspace
        run: cargo validate-workspace

      - name: Check for package metadata
        run: |
          for crate in crates/*/Cargo.toml; do
            dir=$(dirname "$crate")
            if [ ! -f "$dir/.cargo-allow" ]; then
              echo "Checking $dir..."
              cargo metadata --manifest-path="$crate" --format-version=1 --locked > /dev/null || exit 1
            fi
          done

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Publish nestforge-web-core
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web-core/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Publish nestforge-web
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Publish nestforge-web-cli
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web-cli/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Create GitHub Release
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease:
    name: Pre-release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Cargo config
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [ registries ]
          crates-io = { index = "sparse+https://index.crates.io/" }
          EOF

      - name: Publish nestforge-web-core (prerelease)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web-core/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease

      - name: Publish nestforge-web (prerelease)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease

      - name: Publish nestforge-web-cli (prerelease)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path=crates/nestforge-web-cli/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease
