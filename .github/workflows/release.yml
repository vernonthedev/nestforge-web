name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release:')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Get last release tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Analyze commits since last release
        id: analyze
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          
          if [[ -z "$LAST_TAG" ]]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" =~ release:\ ?v?([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              NEW_VERSION="${BASH_REMATCH[1]}"
            else
              NEW_VERSION="0.1.0"
            fi
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "is_first_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          COMMITS=$(git log --format="%s%n%b" $LAST_TAG..HEAD 2>/dev/null || echo "")
          
          MAJOR=false
          MINOR=false
          PATCH=false
          
          while IFS= read -r line; do
            if [[ "$line" == *"BREAKING"* ]] || [[ "$line" =~ \!: ]]; then
              MAJOR=true
            fi
            if [[ "$line" =~ ^feat ]] || [[ "$line" =~ ^refactor ]] || [[ "$line" =~ ^perf ]]; then
              MINOR=true
            elif [[ "$line" =~ ^fix ]] || [[ "$line" =~ ^docs ]] || [[ "$line" =~ ^test ]] || [[ "$line" =~ ^build ]] || [[ "$line" =~ ^ci ]]; then
              PATCH=true
            fi
          done <<< "$COMMITS"
          
          echo "has_minor=$MINOR" >> $GITHUB_OUTPUT
          echo "has_patch=$PATCH" >> $GITHUB_OUTPUT
          
          CURRENT="${LAST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"
          
          if [[ "$MAJOR" == "true" ]]; then
            minor=0
            patch=0
            major=$((major + 1))
          elif [[ "$MINOR" == "true" ]]; then
            patch=0
            minor=$((minor + 1))
          else
            patch=$((patch + 1))
          fi
          
          NEW_VERSION="$major.$minor.$patch"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_first_release=false" >> $GITHUB_OUTPUT

      - name: Update workspace version
        run: |
          VERSION="${{ steps.analyze.outputs.new_version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          for f in crates/nfw-core/Cargo.toml crates/nestforge-web/Cargo.toml crates/nestforge-web-cli/Cargo.toml; do
            sed -i 's/^version\.workspace = true$/version = "'"$VERSION"'"/' "$f"
          done

      - name: Replace path deps with version deps
        run: |
          VERSION="${{ steps.analyze.outputs.new_version }}"
          sed -i 's|nfw-core = { path = "../nfw-core" }|nfw-core = "'"$VERSION"'"|g' crates/nestforge-web/Cargo.toml
          sed -i 's|nfw-core = { path = "../nfw-core" }|nfw-core = "'"$VERSION"'"|g' crates/nestforge-web-cli/Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.analyze.outputs.new_version }}"
          git tag "v${{ steps.analyze.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.analyze.outputs.new_version }}"

      - name: Publish nfw-core
        run: |
          cargo publish -p nfw-core

      - name: Wait before next publish
        run: sleep 15

      - name: Publish nestforge-web
        run: |
          cargo publish -p nestforge-web

      - name: Wait before next publish
        run: sleep 15

      - name: Publish nestforge-web-cli
        run: |
          cargo publish -p nestforge-web-cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: v${{ steps.analyze.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
