name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Publish as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag if workflow dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Cargo config
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [ registries ]
          crates-io = { index = "sparse+https://index.crates.io/" }
          EOF

      - name: Validate workspace
        run: cargo validate-workspace

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Determine if prerelease
        id: prerelease_check
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *"alpha"* ]] || \
             [[ "${{ steps.version.outputs.version }}" == *"beta"* ]] || \
             [[ "${{ steps.version.outputs.version }}" == *"rc"* ]] || \
             [[ '${{ inputs.prerelease }}' == 'true' ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in workspace
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' crates/nestforge-web-core/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' crates/nestforge-web/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' crates/nestforge-web-cli/Cargo.toml

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Publish nestforge-web-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ '${{ steps.prerelease_check.outputs.is_prerelease }}' == 'true' ]]; then
            cargo publish --manifest-path=crates/nestforge-web-core/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease
          else
            cargo publish --manifest-path=crates/nestforge-web-core/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"
          fi

      - name: Publish nestforge-web
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ '${{ steps.prerelease_check.outputs.is_prerelease }}' == 'true' ]]; then
            cargo publish --manifest-path=crates/nestforge-web/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease
          else
            cargo publish --manifest-path=crates/nestforge-web/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"
          fi

      - name: Publish nestforge-web-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ '${{ steps.prerelease_check.outputs.is_prerelease }}' == 'true' ]]; then
            cargo publish --manifest-path=crates/nestforge-web-cli/Cargo.toml --token "$CARGO_REGISTRY_TOKEN" --allow-prerelease
          else
            cargo publish --manifest-path=crates/nestforge-web-cli/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"
          fi

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
