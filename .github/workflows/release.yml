name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'release:')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Get last release tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Analyze commits since last release
        id: analyze
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          COMMITS=$(git log --format=%s $LAST_TAG..HEAD 2>/dev/null || echo "")
          
          MAJOR=false
          MINOR=false
          PATCH=false
          
          while IFS= read -r commit; do
            if [[ "$commit" =~ ^.*\!:\ ]] || [[ "$commit" =~ ^feat\(.*\)\!:\ ]] || [[ "$commit" =~ ^fix\(.*\)\!:\ ]]; then
              MAJOR=true
            elif [[ "$commit" =~ ^feat(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^refactor(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^perf(\([^)]+\))?:\ ]]; then
              MINOR=true
            elif [[ "$commit" =~ ^fix(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^docs(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^test(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^build(\([^)]+\))?:\ ]] || [[ "$commit" =~ ^ci(\([^)]+\))?:\ ]]; then
              PATCH=true
            fi
          done <<< "$COMMITS"
          
          echo "has_major=$MAJOR" >> $GITHUB_OUTPUT
          echo "has_minor=$MINOR" >> $GITHUB_OUTPUT
          echo "has_patch=$PATCH" >> $GITHUB_OUTPUT
          
          # Calculate new version
          CURRENT="${LAST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"
          
          if [[ "$MAJOR" == "true" ]]; then
            minor=0
            patch=0
            major=$((major + 1))
          elif [[ "$MINOR" == "true" ]]; then
            patch=0
            minor=$((minor + 1))
          else
            patch=$((patch + 1))
          fi
          
          NEW_VERSION="$major.$minor.$patch"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Print release info
        run: |
          echo "Last release: ${{ steps.last_tag.outputs.last_tag }}"
          echo "New version: v${{ steps.analyze.outputs.new_version }}"
          echo "Breaking changes: ${{ steps.analyze.outputs.has_major }}"
          echo "Features: ${{ steps.analyze.outputs.has_minor }}"
          echo "Fixes: ${{ steps.analyze.outputs.has_patch }}"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Cargo config
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [ registries ]
          crates-io = { index = "sparse+https://index.crates.io/" }
          EOF

      - name: Update versions
        run: |
          VERSION="${{ steps.analyze.outputs.new_version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/nestforge-web-core/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/nestforge-web/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/nestforge-web-cli/Cargo.toml

      - name: Generate changelog
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          {
            echo "# Changelog"
            echo ""
            echo "## v${{ steps.analyze.outputs.new_version }}"
            echo ""
            git log --format="### %s" $LAST_TAG..HEAD | grep -E "^(feat|fix|docs|test|build|ci|perf|refactor|chore|revert)" || echo "Initial release"
          } > CHANGELOG.md

      - name: Show changelog
        run: |
          echo "=== Generated Changelog ==="
          cat CHANGELOG.md
          echo "==========================="

      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit --amend --no-edit || true

      - name: Create tag
        run: |
          git tag v${{ steps.analyze.outputs.new_version }}
          git push origin v${{ steps.analyze.outputs.new_version }} || true

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Publish nestforge-web-core
        run: |
          cargo publish --manifest-path=crates/nestforge-web-core/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Publish nestforge-web
        run: |
          cargo publish --manifest-path=crates/nestforge-web/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Publish nestforge-web-cli
        run: |
          cargo publish --manifest-path=crates/nestforge-web-cli/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: CHANGELOG.md
          tag: v${{ steps.analyze.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
